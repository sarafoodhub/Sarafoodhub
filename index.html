<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara's Food Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.card{
max-width:430px;
margin:auto;
background:#1c1c1c;
border:2px solid #d4af37;
border-radius:20px;
padding:25px;
box-shadow:0 0 20px rgba(212,175,55,.25);
}

h1{
text-align:center;
color:#d4af37;
font-size:32px;
margin-bottom:8px;
}

.tagline{
text-align:center;
color:#ddd;
margin-bottom:18px;
font-size:15px;
}

.status{
text-align:center;
padding:10px;
border-radius:10px;
font-weight:bold;
margin-bottom:18px;
font-size:17px;
}

.open{
background:#0f7b2d;
color:#fff;
}

.closed{
background:#8b0000;
color:#fff;
}

.btn{
display:block;
width:100%;
text-align:center;
text-decoration:none;
background:#d4af37;
color:#111;
padding:14px;
margin:12px 0;
border-radius:10px;
font-weight:bold;
font-size:17px;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
}

.section-title{
color:#d4af37;
margin-top:20px;
margin-bottom:8px;
font-size:20px;
}

.info{
color:#ddd;
line-height:1.8;
}

.offer-box{
background:#2a2a2a;
border:2px solid #d4af37;
border-radius:15px;
padding:15px;
margin-top:18px;
text-align:center;
}

.offer-day{
font-size:22px;
color:#d4af37;
font-weight:bold;
}

.offer-text{
margin-top:10px;
font-size:18px;
line-height:1.6;
}

.valid{
margin-top:12px;
color:#00ff99;
font-weight:bold;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}
</style>
</head>
