
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara's Food Hub - Menu</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.card{
max-width:430px;
margin:auto;
background:#1c1c1c;
border:2px solid #d4af37;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px rgba(212,175,55,.25);
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
text-align:center;
text-decoration:none;
background:#d4af37;
color:#111;
padding:14px;
margin:12px 0;
border-radius:10px;
font-weight:bold;
font-size:17px;
border:none;
cursor:pointer;
}

#menuList{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.food-card{
background:#2b2b2b;
border:1px solid #d4af37;
padding:12px;
border-radius:12px;
text-align:center;
}

@media(min-width:768px){

#menuList{
grid-template-columns:repeat(4,1fr);
}

}
.menu-name{
font-size:15px;
font-weight:bold;
min-height:42px;
}

.menu-price{
color:#d4af37;
margin-top:5px;
font-size:18px;
font-weight:bold;
}
.add-btn{
background:#d4af37;
color:#111;
padding:8px 14px;
border:none;
border-radius:8px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
width:100%;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

#cartItems{
margin-top:15px;
}
.ribbon{
background:#ff3d00;
color:#fff;
padding:3px 8px;
border-radius:6px;
font-size:11px;
font-weight:bold;
display:inline-block;
margin-bottom:6px;
}
  .food-image{
width:100%;
height:80px;
object-fit:cover;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
  }
  #foodPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#1c1c1c;
border:2px solid #d4af37;
border-radius:20px;
padding:20px;
width:90%;
max-width:350px;
text-align:center;
position:relative;
}

#popupImg{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

.popup-name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
color:#fff;
}

.popup-price{
font-size:24px;
font-weight:bold;
color:#d4af37;
margin-bottom:15px;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
color:#fff;
}
</style>
</head>

<body>

<div class="card">

<h1>🍽️ Sara's Food Hub</h1>

<a class="btn" href="index.html">⬅ Back to Home</a>

<input
id="searchMenu"
type="text"
placeholder="🔍 Search Food..."
onkeyup="searchMenu()">

  <button class="btn" onclick="toggleMenu()">
🍽️ Menu
</button>

<div id="categoryButtons">

<button class="btn" onclick="showCategory('Momos')">🥟 Momos</button>
<button class="btn" onclick="showCategory('Roll')">🌯 Rolls</button>
<button class="btn" onclick="showCategory('Fries')">🍟 Fries</button>
<button class="btn" onclick="showCategory('Rice')">🍚 Rice</button>

</div>
<div id="menuList"></div>

<h2 style="margin-top:20px;color:#d4af37;">🛒 Your Order</h2>

<div id="cartItems" style="
background:#2b2b2b;
border:1px solid #d4af37;
border-radius:12px;
padding:15px;
min-height:80px;
margin-bottom:15px;">

No items selected

</div>

<h2 style="margin-top:15px;color:#00ff99;">
Total ₹ <span id="total">0</span>
</h2>
  <button class="btn" onclick="sendOrder()">
📲 Order on WhatsApp
  </button>
<script>

const menu=[

{name:"Veg Momos (Steam)",price:100},
{name:"Veg Momos (Fried)",price:120},
{name:"Veg Cheese Momos (Steam)",price:120},
{name:"Veg Cheese Momos (Fried)",price:180},
{name:"Paneer Momos (Steam)",price:120},
{name:"Paneer Momos (Fried)",price:180},
{name:"Paneer Cheese Momos (Steam)",price:140},
{name:"Paneer Cheese Momos (Fried)",price:180},
{name:"Chicken Momos (Steam)",price:140},
{name:"Chicken Momos (Fried)",price:180},
{name:"Chicken Cheese Momos (Steam)",price:160},
{name:"Chicken Cheese Momos (Fried)",price:200},
{name:"Egg Roll",price:70},
{name:"Double Egg Roll",price:90},
{name:"Chicken Roll",price:120},
{name:"Chicken Egg Roll",price:140},
{name:"Paneer Roll",price:120},
{name:"Paneer Cheese Roll",price:140},
{name:"Egg Fried Rice",price:90},
{name:"Chicken Fried Rice",price:120},
{name:"Egg Chicken Fried Rice",price:140},
{name:"Biryani",price:180},
{name:"Hyderabadi Dum Biryani",price:200},
{name:"Dal Khichdi",price:120},
{name:"Regular Fries",price:80},
{name:"Peri Peri Fries",price:120},
{name:"Cheese Fries",price:140}

];
menu.forEach(item=>{

if(item.name.includes("Steam")){
item.image="image/steam-momos.jpg";
}

else if(item.name.includes("Fried") && item.name.includes("Momos")){
item.image="image/fried-momos.jpg";
}

else if(item.name.includes("Roll")){
item.image="image/roll.jpg";
}

else if(item.name.includes("Rice")){
item.image="image/fried-rice.jpg";
}

else if(item.name.includes("Fries")){
item.image="image/fries.jpg";
}

else if(item.name.includes("Biryani")){
item.image="image/biryani.jpg";
}
else if(item.name.includes("Dal Khichdi")){
item.image="image/fried-rice.jpg";
}
});
let html="";
let cart=[];

menu.forEach((item,index)=>{

html+=`
<div class="food-card">
<img src="${item.image}" class="food-image" onclick="openPopup(${index})">
<div class="menu-name">${item.name}</div>
${item.name=="Chicken Momos (Steam)" ||
item.name=="Chicken Momos (Fried)" ||
item.name=="Chicken Egg Roll"
? '<div class="ribbon">🔥 HOT</div>'
: ""}

${item.name=="Chicken Momos (Steam)" ||
item.name=="Chicken Momos (Fried)" ||
item.name=="Chicken Egg Roll"
? '<div style="color:gold;font-size:13px;">⭐ Best Seller</div>'
: ""}
${item.name=="Hyderabadi Dum Biryani"
? '<div style="display:inline-block;background:#00c853;color:white;padding:2px 8px;border-radius:12px;font-size:11px;margin-top:4px;">🆕 NEW</div>'
: ""}

<div class="menu-price">₹${item.price}</div>

<div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;">

<button class="add-btn" style="width:45px;" onclick="decrease(${index})">➖</button>

<span id="qty${index}" style="font-size:18px;font-weight:bold;">0</span>

<button class="add-btn" style="width:45px;" onclick="increase(${index})">➕</button>

</div>

</div>
`;

});

document.getElementById("menuList").innerHTML=html;
menu.forEach((item,index)=>{
let card=document.getElementsByClassName("food-card")[index];
if(card){
card.style.display="none";
}
});
  function refreshQty(){

menu.forEach((item,index)=>{

let q = 0;

let cartItem = cart.find(x => x.name === item.name);

if(cartItem){
q = cartItem.qty;
}

let qty = document.getElementById("qty"+index);

if(qty){
qty.innerHTML = q;
}

});

  }

function searchMenu(){

let input=document.getElementById("searchMenu").value.toLowerCase();

let cards=document.getElementsByClassName("food-card");

for(let i=0;i<cards.length;i++){

let text=cards[i].innerText.toLowerCase();

cards[i].style.display=text.includes(input)?"block":"none";

}

}

function showCategory(category){

let cards=document.getElementsByClassName("food-card");

for(let i=0;i<cards.length;i++){

let name=menu[i].name;

if(category=="Momos" && name.includes("Momos")){
cards[i].style.display="block";
}

else if(category=="Roll" && name.includes("Roll")){
cards[i].style.display="block";
}

else if(category=="Fries" && name.includes("Fries")){
cards[i].style.display="block";
}

else if(category=="Rice" && 
(name.includes("Rice") || name.includes("Biryani") || name.includes("Khichdi"))){
cards[i].style.display="block";
}

else{
cards[i].style.display="none";
}

}
document.getElementById("categoryButtons").style.display = "none";
}

function increase(index){

let item = cart.find(x => x.name === menu[index].name);

if(item){

item.qty++;

}else{

cart.push({
name:menu[index].name,
price:menu[index].price,
qty:1
});

}

updateCart();

refreshQty();

}

function decrease(index){

let item = cart.find(x => x.name === menu[index].name);

if(!item) return;

item.qty--;

if(item.qty<=0){

cart = cart.filter(x => x.name !== menu[index].name);

}

updateCart();

refreshQty();

}
  function addCart(index){

increase(index);

  }

function updateCart(){

let output="";
let total=0;
let orderText="";

cart.forEach((item,index)=>{

let sub=item.price*item.qty;
total+=sub;

orderText+=item.name+" x"+item.qty+", ";

output+=`

<div class="food-card">

<div class="menu-name">${item.name}</div>

<div class="menu-price">
₹${item.price} × ${item.qty} = ₹${sub}
</div>

<div style="margin-top:8px;color:#aaa;font-size:14px;">
Qty : ${item.qty}
</div>

</div>

`;

});

if(cart.length==0){

output="No items selected";

}

document.getElementById("cartItems").innerHTML=output;

document.getElementById("total").innerHTML=total;
  refreshQty();

}
function sendOrder(){

if(cart.length==0){
alert("Please add at least one item.");
return;
}

let total=0;
let message="🍽️ *Sara's Food Hub Order*%0A%0A";

cart.forEach(item=>{
total+=item.price*item.qty;

message+="✅ "+item.name+
" x"+item.qty+
" = ₹"+(item.price*item.qty)+"%0A";
});

message+="%0A💰 *Total: ₹"+total+"*";

window.open(
"https://wa.me/918669092091?text="+message,
"_blank"
);

}
  function openPopup(index){

document.getElementById("foodPopup").style.display="flex";

document.getElementById("popupImg").src=menu[index].image;

document.getElementById("popupName").innerHTML=menu[index].name;

document.getElementById("popupPrice").innerHTML="₹"+menu[index].price;
    document.getElementById("popupBadge").innerHTML =
(menu[index].name.includes("Chicken Momos") ||
menu[index].name=="Chicken Egg Roll")
? "⭐ Best Seller"
: "";
    

document.getElementById("popupCartBtn").onclick=function(){

addCart(index);

closePopup();

};

}

function closePopup(){

document.getElementById("foodPopup").style.display="none";

}
</script>

</div>
<div id="foodPopup">

<div class="popup-box">

<span class="close-btn" onclick="closePopup()">✖</span>

<img id="popupImg" src="">

<div class="popup-name" id="popupName"></div>
  
<div id="popupBadge" style="color:gold;font-weight:bold;margin:8px 0;"></div>
<div class="popup-price" id="popupPrice"></div>

<button class="btn" id="popupCartBtn">
🛒 Add To Cart
</button>

</div>

</div>
</body>

</html>
